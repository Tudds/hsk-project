<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Hanzify - Học tiếng Trung hiện đại">

  <!-- Preconnect to Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="dns-prefetch" href="https://fonts.googleapis.com">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Hanzify">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Hanzify</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      background-color: #F8FAFC;
      margin: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Inter', sans-serif;
    }
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #E2E8F0;
      border-top: 4px solid #0F172A;
      border-radius: 50%;
      animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }
    .loading-text {
      color: #0F172A;
      font-weight: 600;
      font-size: 18px;
      letter-spacing: -0.025em;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    /* Dark mode support for loader */
    @media (prefers-color-scheme: dark) {
      body { background-color: #0F172A; }
      .spinner { border-color: #1E293B; border-top-color: #38BDF8; }
      .loading-text { color: #F1F5F9; }
    }
  </style>
</head>
<body>
  <div class="loading-container" id="loading-indicator">
    <div class="spinner"></div>
    <div class="loading-text">Hanzify đang tải...</div>
  </div>

  <script>
    window.addEventListener('load', function(ev) {
      // The loading indicator will be removed by Flutter once it initializes
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
